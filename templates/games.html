{% extends "base.html" %}

{% block content %}
    <h2>My Games</h2>

    {% if games %}
        {% for game in games %}
            <div>
                <p><strong>Title:</strong> {{ game.title }}</p>
                <p><strong>Genre:</strong> {{ game.genre }}</p>
                <p><strong>Platform:</strong> {{ game.platform }}</p>
                <p><strong>Rating:</strong> {{ game.rating }}</p>
                <hr>
            </div>
        {% endfor %}
    {% else %}
        <p>No games have been added yet.</p>
    {% endif %}
{% endblock %}
